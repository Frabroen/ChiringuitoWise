<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#E0F2FE"/>
  <!-- Body -->
  <ellipse cx="50" cy="66" rx="24" ry="20" fill="#64748B"/>
  <!-- White belly -->
  <ellipse cx="50" cy="68" rx="16" ry="14" fill="#F1F5F9"/>
  <!-- Tie -->
  <polygon points="50,58 54,66 50,82 46,66" fill="#DC2626"/>
  <polygon points="47,58 53,58 54,62 46,62" fill="#B91C1C"/>
  <!-- Suit jacket -->
  <path d="M26 70 Q35 58 44 62 L44 86 L26 86 Z" fill="#1E293B"/>
  <path d="M74 70 Q65 58 56 62 L56 86 L74 86 Z" fill="#1E293B"/>
  <!-- Suit lapels -->
  <path d="M44 62 Q46 58 50 58 Q48 64 44 66 Z" fill="#334155"/>
  <path d="M56 62 Q54 58 50 58 Q52 64 56 66 Z" fill="#334155"/>
  <!-- Fin on back -->
  <path d="M50 42 Q58 28 64 34 Q60 40 56 44 Z" fill="#475569"/>
  <!-- Head -->
  <ellipse cx="50" cy="46" rx="20" ry="16" fill="#64748B"/>
  <!-- White snout area -->
  <ellipse cx="50" cy="52" rx="14" ry="8" fill="#94A3B8"/>
  <!-- Eyes -->
  <circle cx="42" cy="42" r="4" fill="white"/>
  <circle cx="58" cy="42" r="4" fill="white"/>
  <circle cx="42" cy="42" r="2.5" fill="#1C1917"/>
  <circle cx="58" cy="42" r="2.5" fill="#1C1917"/>
  <!-- Dead serious expression -->
  <line x1="42" y1="52" x2="58" y2="52" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Teeth showing slightly -->
  <path d="M42 52 Q46 56 50 53 Q54 56 58 52" fill="white" stroke="#94A3B8" stroke-width="0.5"/>
  <!-- Gills -->
  <path d="M30 46 Q28 50 30 54" stroke="#475569" stroke-width="1.5" fill="none"/>
  <path d="M33 44 Q31 48 33 52" stroke="#475569" stroke-width="1.5" fill="none"/>
  <!-- Fins sides -->
  <path d="M26 60 L14 52 L18 64 Z" fill="#475569"/>
  <path d="M74 60 L86 52 L82 64 Z" fill="#475569"/>
  <!-- Briefcase -->
  <rect x="38" y="82" width="24" height="14" rx="2" fill="#92400E"/>
  <rect x="44" y="80" width="12" height="4" rx="1" fill="#78350F"/>
  <line x1="50" y1="82" x2="50" y2="96" stroke="#78350F" stroke-width="1.5"/>
