<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#E0F2FE"/>
  <!-- Flotador (donut ring) -->
  <circle cx="50" cy="62" r="22" fill="#EF4444"/>
  <circle cx="50" cy="62" r="14" fill="#E0F2FE"/>
  <!-- Flotador stripes -->
  <path d="M28 62 Q28 40 50 40 Q72 40 72 62" fill="white" opacity="0.3"/>
  <path d="M28 62 Q28 84 50 84 Q72 84 72 62" fill="#DC2626" opacity="0.3"/>
  <!-- Fish body -->
  <ellipse cx="50" cy="56" rx="16" ry="11" fill="#F59E0B"/>
  <!-- Fish scales -->
  <path d="M38 52 Q42 48 46 52" fill="none" stroke="#D97706" stroke-width="1"/>
  <path d="M44 52 Q48 48 52 52" fill="none" stroke="#D97706" stroke-width="1"/>
  <path d="M50 52 Q54 48 58 52" fill="none" stroke="#D97706" stroke-width="1"/>
  <path d="M41 57 Q45 53 49 57" fill="none" stroke="#D97706" stroke-width="1"/>
  <path d="M47 57 Q51 53 55 57" fill="none" stroke="#D97706" stroke-width="1"/>
  <!-- Tail -->
  <path d="M66 56 L78 48 L78 64 Z" fill="#F59E0B"/>
  <!-- Sunglasses -->
  <rect x="36" y="49" width="9" height="7" rx="3" fill="#1C1917"/>
  <rect x="47" y="49" width="9" height="7" rx="3" fill="#1C1917"/>
  <line x1="45" y1="52" x2="47" y2="52" stroke="#1C1917" stroke-width="1.5"/>
  <line x1="33" y1="52" x2="36" y2="52" stroke="#1C1917" stroke-width="1.5"/>
  <line x1="56" y1="52" x2="59" y2="52" stroke="#1C1917" stroke-width="1.5"/>
  <!-- Smile / mouth -->
  <path d="M40 60 Q44 64 48 60" stroke="#D97706" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Fin on top -->
  <path d="M46 45 Q50 36 54 45" fill="#EF9F27" stroke="#D97706" stroke-width="1"/>
  <!-- Bubbles -->
  <circle cx="28" cy="42" r="3" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <circle cx="22" cy="34" r="2" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
  <circle cx="30" cy="28" r="4" fill="none" stroke="#7DD3FC" stroke-width="1.5"/>
</svg>