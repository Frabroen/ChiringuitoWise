<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#FEF3C7"/>
  <!-- Sombrero brim -->
  <ellipse cx="50" cy="32" rx="28" ry="6" fill="#92400E"/>
  <!-- Sombrero top -->
  <rect x="36" y="10" width="28" height="24" rx="4" fill="#B45309"/>
  <!-- Sombrero band -->
  <rect x="36" y="28" width="28" height="5" fill="#DC2626"/>
  <!-- Sombrero pompoms -->
  <circle cx="38" cy="30" r="2.5" fill="#F59E0B"/>
  <circle cx="44" cy="30" r="2.5" fill="#10B981"/>
  <circle cx="50" cy="30" r="2.5" fill="#EF4444"/>
  <circle cx="56" cy="30" r="2.5" fill="#F59E0B"/>
  <circle cx="62" cy="30" r="2.5" fill="#10B981"/>
  <!-- Face -->
  <circle cx="50" cy="48" r="14" fill="#FDE68A"/>
  <!-- Eyes -->
  <circle cx="45" cy="46" r="2.5" fill="#1C1917"/>
  <circle cx="55" cy="46" r="2.5" fill="#1C1917"/>
  <!-- Moustache -->
  <path d="M43 52 Q47 56 50 53 Q53 56 57 52" stroke="#92400E" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Big smile -->
  <path d="M44 55 Q50 61 56 55" stroke="#92400E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="36" y="62" width="28" height="22" rx="4" fill="#DC2626"/>
  <!-- White shirt detail -->
  <rect x="47" y="62" width="6" height="22" fill="white" opacity="0.3"/>
  <!-- Arms -->
  <line x1="36" y1="68" x2="18" y2="60" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="68" x2="82" y2="60" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
  <!-- Maracas -->
  <circle cx="14" cy="57" r="6" fill="#F59E0B"/>
  <line x1="14" y1="63" x2="14" y2="72" stroke="#92400E" stroke-width="2.5"/>
  <circle cx="86" cy="57" r="6" fill="#10B981"/>
  <line x1="86" y1="63" x2="86" y2="72" stroke="#065F46" stroke-width="2.5"/>
  <!-- Tequila bottle -->
  <rect x="44" y="84" width="12" height="10" rx="2" fill="#10B981" opacity="0.8"/>
  <rect x="47" y="80" width="6" height="6" rx="1" fill="#10B981" opacity="0.8"/>
</svg>