<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <circle cx="50" cy="50" r="50" fill="#E0F2FE"/>
  <!-- Body -->
  <ellipse cx="50" cy="62" rx="18" ry="14" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Wings open stressed -->
  <ellipse cx="24" cy="55" rx="14" ry="6" fill="white" stroke="#94A3B8" stroke-width="1.5" transform="rotate(-20 24 55)"/>
  <ellipse cx="76" cy="55" rx="14" ry="6" fill="white" stroke="#94A3B8" stroke-width="1.5" transform="rotate(20 76 55)"/>
  <!-- Head -->
  <circle cx="50" cy="38" r="14" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
  <!-- Stressed eyes X X -->
  <text x="44" y="37" font-size="9" font-family="Arial" font-weight="bold" fill="#EF4444">✕</text>
  <text x="52" y="37" font-size="9" font-family="Arial" font-weight="bold" fill="#EF4444">✕</text>
  <!-- Beak -->
  <polygon points="50,42 46,47 54,47" fill="#F59E0B"/>
  <!-- Stress lines -->
  <line x1="30" y1="22" x2="25" y2="16" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="37" y1="19" x2="35" y2="12" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="22" x2="75" y2="16" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="63" y1="19" x2="65" y2="12" stroke="#EF4444" stroke-width="2" stroke-linecap="round"/>
  <!-- Feet -->
  <line x1="44" y1="76" x2="40" y2="84" stroke="#F59E0B" stroke-width="2"/>
  <line x1="56" y1="76" x2="60" y2="84" stroke="#F59E0B" stroke-width="2"/>
  <line x1="37" y1="84" x2="44" y2="84" stroke="#F59E0B" stroke-width="2"/>
  <line x1="57" y1="84" x2="64" y2="84" stroke="#F59E0B" stroke-width="2"/>
</svg>