<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#E0F2FE"/>
  <!-- Wave body main -->
  <path d="M10 70 Q20 40 35 55 Q45 65 50 45 Q55 25 65 40 Q75 55 90 35 L90 85 Q75 75 65 80 Q55 88 50 80 Q45 75 35 80 Q20 88 10 80 Z" fill="#0EA5E9"/>
  <!-- Wave crest white foam -->
  <path d="M10 70 Q20 40 35 55 Q45 65 50 45 Q55 25 65 40 Q75 55 90 35" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <!-- Foam bubbles -->
  <circle cx="25" cy="52" r="4" fill="white" opacity="0.7"/>
  <circle cx="50" cy="44" r="5" fill="white" opacity="0.7"/>
  <circle cx="75" cy="40" r="4" fill="white" opacity="0.7"/>
  <!-- Face on wave -->
  <circle cx="50" cy="65" r="16" fill="#38BDF8"/>
  <!-- Angry eyebrows -->
  <line x1="40" y1="58" x2="47" y2="61" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="53" y1="61" x2="60" y2="58" stroke="#1C1917" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Eyes -->
  <circle cx="44" cy="64" r="3" fill="#1C1917"/>
  <circle cx="56" cy="64" r="3" fill="#1C1917"/>
  <!-- Angry mouth -->
  <path d="M43 73 Q50 68 57 73" stroke="#1C1917" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Arms crossed -->
  <!-- Left arm -->
  <path d="M34 68 Q28 72 30 78 Q36 76 42 74" stroke="#0284C7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M66 68 Q72 72 70 78 Q64 76 58 74" stroke="#0284C7" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Arms crossed over body -->
  <path d="M34 72 Q44 70 56 74" stroke="#0369A1" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M66 72 Q56 70 44 74" stroke="#0369A1" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Angry steam -->
  <path d="M38 54 Q36 48 38 42" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 50 Q50 44 50 38" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M62 54 Q64 48 62 42" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
</svg>