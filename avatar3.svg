<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="50" fill="#FCE7F3"/>
  <!-- Phone/Instagram frame -->
  <rect x="30" y="55" width="40" height="35" rx="5" fill="#1C1917"/>
  <rect x="33" y="58" width="34" height="25" rx="3" fill="#E0F2FE"/>
  <!-- Instagram gradient circle on phone -->
  <circle cx="50" cy="70" r="8" fill="none" stroke="#E1306C" stroke-width="2.5"/>
  <circle cx="57" cy="63" r="2" fill="#F77737"/>
  <!-- Face -->
  <circle cx="50" cy="38" r="14" fill="#FDE68A"/>
  <!-- Trendy hair -->
  <ellipse cx="50" cy="26" rx="14" ry="6" fill="#1C1917"/>
  <ellipse cx="50" cy="24" rx="10" ry="4" fill="#1C1917"/>
  <!-- Sunglasses -->
  <rect x="38" y="35" width="10" height="7" rx="3" fill="#1C1917"/>
  <rect x="52" y="35" width="10" height="7" rx="3" fill="#1C1917"/>
  <line x1="48" y1="38" x2="52" y2="38" stroke="#1C1917" stroke-width="1.5"/>
  <line x1="33" y1="38" x2="38" y2="38" stroke="#1C1917" stroke-width="1.5"/>
  <line x1="62" y1="38" x2="67" y2="38" stroke="#1C1917" stroke-width="1.5"/>
  <!-- Smile -->
  <path d="M44 45 Q50 51 56 45" stroke="#92400E" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="36" y="52" width="28" height="10" rx="3" fill="#7C3AED"/>
  <!-- Arms holding flags -->
  <line x1="36" y1="56" x2="16" y2="48" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="56" x2="84" y2="48" stroke="#FDE68A" stroke-width="5" stroke-linecap="round"/>
  <!-- Colombian flag (left) -->
  <line x1="16" y1="36" x2="16" y2="50" stroke="#92400E" stroke-width="1.5"/>
  <rect x="16" y="29" width="14" height="4" fill="#F59E0B"/>
  <rect x="16" y="33" width="14" height="2" fill="#DC2626"/>
  <rect x="16" y="35" width="14" height="4" fill="#1D4ED8"/>
  <!-- Venezuelan flag (right) -->
  <line x1="84" y1="36" x2="84" y2="50" stroke="#92400E" stroke-width="1.5"/>
  <rect x="70" y="29" width="14" height="3" fill="#F59E0B"/>
  <rect x="70" y="32" width="14" height="3" fill="#DC2626"/>
  <rect x="70" y="35" width="14" height="3" fill="#1D4ED8"/>
  <!-- Stars on Venezuelan flag -->
  <text x="73" y="35" font-size="4" fill="white">★★★</text>
</svg>