  <line x1="64" y1="59" x2="69" y2="59" stroke="#BE185D" stroke-width="1.5"/>
  <!-- Big happy smile -->
  <path d="M40 67 Q50 76 60 67" stroke="#D97706" stroke-width="2" fill="#FDE68A" stroke-linecap="round"/>
  <!-- Pineapple leaves/crown -->
  <path d="M50 36 Q44 20 38 14" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M50 36 Q50 18 50 10" stroke="#16A34A" stroke-width="4" fill="none" stroke-linecap="round"/>
