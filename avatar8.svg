  <line x1="30" y1="72" x2="70" y2="72" stroke="#D97706" stroke-width="1" opacity="0.6"/>
  <line x1="32" y1="80" x2="68" y2="80" stroke="#D97706" stroke-width="1" opacity="0.6"/>
  <line x1="38" y1="44" x2="44" y2="92" stroke="#D97706" stroke-width="1" opacity="0.6"/>
